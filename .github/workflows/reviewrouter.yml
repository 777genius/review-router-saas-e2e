name: ReviewRouter

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number for manual reruns"
        required: false
        type: string

permissions: {}

jobs:
  review:
    name: review
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: 777genius/review-router/.github/workflows/reviewrouter-reusable.yml@main
    with:
      runtime_ref: main
      api_url: "https://api.reviewrouter.site"
      runtime_config_mode: static
      static_runtime_env_json: |-
        {
          "REVIEWROUTER_CONFIG_SCHEMA_VERSION": "1",
          "REVIEW_AUTH_MODE": "codex-oauth",
          "CODEX_MODEL": "gpt-5.5",
          "CODEX_REASONING_EFFORT": "low",
          "CODEX_AGENTIC_CONTEXT": "true",
          "CODEX_FAST_MODE": "false",
          "FAIL_ON_SEVERITY": "major",
          "INLINE_MAX_COMMENTS": "5",
          "TARGET_TOKENS_PER_BATCH": "50000",
          "REVIEW_OUTPUT_LANGUAGE": "Russian"
        }
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
