name: ReviewRouter Interaction

on:
  pull_request_review_comment:
    types: [created, edited]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  interaction:
    name: interaction
    if: ${{ github.event_name == 'workflow_dispatch' || ((github.event_name != 'issue_comment' || github.event.issue.pull_request) && github.event.comment.user.type != 'Bot') }}
    uses: 777genius/review-router/.github/workflows/reviewrouter-interaction-reusable.yml@029341d731e13ef1e083b3290dc6b56d0f00587c
    with:
      runtime_ref: 029341d731e13ef1e083b3290dc6b56d0f00587c
      api_url: "https://api.reviewrouter.site"
      runtime_config_mode: static
      review_workflow_file: reviewrouter.yml
      discussion_mode: ${{ vars.REVIEW_ROUTER_DISCUSSION_MODE || 'off' }}
      discussion_model: ${{ vars.REVIEW_CODEX_MODEL || 'gpt-5.5' }}
      discussion_reasoning_effort: ${{ vars.REVIEW_CODEX_EFFORT || 'medium' }}
      discussion_max_per_pr: ${{ vars.REVIEW_ROUTER_DISCUSSION_MAX_PER_PR || '20' }}
      discussion_max_per_thread: ${{ vars.REVIEW_ROUTER_DISCUSSION_MAX_PER_THREAD || '5' }}
      discussion_timeout_seconds: ${{ vars.REVIEW_ROUTER_DISCUSSION_TIMEOUT_SECONDS || '60' }}
    secrets:
      REVIEW_ROUTER_LEDGER_KEY: ${{ secrets.REVIEW_ROUTER_LEDGER_KEY }}
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
      CODEX_CONFIG_TOML: ${{ secrets.CODEX_CONFIG_TOML }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
